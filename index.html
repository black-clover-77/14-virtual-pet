<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Virtual Pet | VishwaNova 2026</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="../shared/experience-kit.css" />
    <link rel="stylesheet" href="../shared/mobile.css" />
    <link rel="stylesheet" href="../shared/soundkit.css" />
    <style>
      canvas {
        max-width: 100vw !important;
        max-height: 80vh !important;
        object-fit: contain;
      }
      body {
        overflow-x: hidden;
        touch-action: manipulation;
      }
      canvas {
        max-width: 100%;
        height: auto;
      }
    </style>
    <link rel="stylesheet" href="../shared/fx-kit.css" />
  <link rel="stylesheet" href="../shared/engagement-kit.css" />
</head>
  <body>
    <div id="loader">
      <div class="loader-content">
        <p class="loader-text">🐣 Hatching your pet...</p>
      </div>
    </div>
    <audio id="bg-audio" loop>
      <source
        src="https://cdn.pixabay.com/audio/2022/03/10/audio_03d9d3000a.mp3?v=107"
        type="audio/mpeg"
      /></audio
    ><button id="audio-toggle">🎵</button>
    <main id="app">
      <canvas id="pet-canvas" width="400" height="400"></canvas>
      <div id="status-bars">
        <div class="stat">
          <span>❤️ Health</span>
          <div class="bar">
            <div id="health-bar" class="fill" style="width: 80%"></div>
          </div>
          <span id="health-val">80</span>
        </div>
        <div class="stat">
          <span>🍔 Hunger</span>
          <div class="bar">
            <div id="hunger-bar" class="fill hunger" style="width: 50%"></div>
          </div>
          <span id="hunger-val">50</span>
        </div>
        <div class="stat">
          <span>😊 Happy</span>
          <div class="bar">
            <div id="happy-bar" class="fill happy" style="width: 70%"></div>
          </div>
          <span id="happy-val">70</span>
        </div>
        <div class="stat">
          <span>⚡ Energy</span>
          <div class="bar">
            <div id="energy-bar" class="fill energy" style="width: 90%"></div>
          </div>
          <span id="energy-val">90</span>
        </div>
      </div>
      <div id="actions">
        <button id="feed-btn">🍕 Feed</button
        ><button id="play-btn">🎾 Play</button
        ><button id="sleep-btn">😴 Sleep</button
        ><button id="clean-btn">🛁 Clean</button
        ><button id="pet-btn">🤗 Pet</button>
      </div>
      <div id="pet-mood">Mood: 😊 Happy</div>
    </main>
    <footer class="github-badge">
      <a href="https://github.com/AkshatRock/weboreel-hackathon" target="_blank"
        >⭐ GitHub Repo</a
      ><span>VishwaNova 2026</span>
    </footer>
    <script src="../shared/soundkit.js" defer></script>
    <script src="../shared/experience-kit.js" defer></script>
    <script src="../shared/engagement-kit.js" defer></script>
    <script src="../shared/experience-configs-1-21.js" defer></script>
    <script src="../shared/fx-kit.js" defer></script>
    <script src="script.js"></script>
  
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const parts = location.pathname.split("/").filter(Boolean);
        const slug = parts[parts.length - 2] || "";
        const cfg = window.WeboReelsExperienceConfigs1to21?.[slug] || { title: document.title };
        window.WeboReelsExperienceKit?.init?.(cfg);
      });
    </script>
</body>
</html>
